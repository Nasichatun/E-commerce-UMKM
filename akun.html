<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akun - TokoKita</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- 🔐 PROTECT LOGIN -->
<script>
if (localStorage.getItem("login") !== "true") {
  alert("Silakan login dulu!");
  window.location.href = "login.html";
}
</script>

<!-- NAVBAR (simple) -->
<nav class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="font-bold text-indigo-600">TokoKita</h1>

  <div class="flex gap-4 text-sm">
    <a href="home.html" class="text-gray-600">Beranda</a>
    <a href="produk.html" class="text-gray-600">Produk</a>
    <a href="keranjang.html" class="text-gray-600">Keranjang</a>
    <a href="akun.html" class="text-indigo-600 font-semibold">Akun</a>
  </div>
</nav>

<!-- CONTENT -->
<div class="max-w-3xl mx-auto p-4 mt-6">

  <!-- PROFILE -->
  <div class="bg-white rounded-lg shadow p-6 text-center">

    <div class="w-24 h-24 mx-auto rounded-full bg-gray-200"></div>

    <h2 id="name" class="mt-4 text-xl font-bold">User</h2>
    <p id="email" class="text-gray-500 text-sm">-</p>

    <p class="mt-2 text-sm">
      Status:
      <span id="status" class="font-semibold"></span>
    </p>

  </div>

  <!-- MENU SIMPLE (cuma logout) -->
  <div class="mt-6 bg-white rounded-lg shadow">

    <button onclick="logout()" 
      class="w-full text-left p-4 text-red-500 hover:bg-gray-50">
      🚪 Logout
    </button>

  </div>

</div>

<!-- SCRIPT -->
<script>

// ambil data login
const name = localStorage.getItem("name");
const email = localStorage.getItem("email");
const role = localStorage.getItem("role");

// tampilkan
document.getElementById("name").innerText = name || "User";
document.getElementById("email").innerText = email || "-";

document.getElementById("status").innerText =
  role === "admin" ? "Admin" : "Member";

// logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
